name: Release

on:
  push:
    tags: [v*]
  workflow_dispatch:
    inputs:
      version:
        description: Version to release without the leading "v"
        required: true
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build (${{ matrix.args || matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target aarch64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS requires both targets for cross-compilation between ARM and Intel
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            xdg-utils \
            libgtk-3-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and release with Tauri
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', inputs.version) }}
          releaseBody: |
            ## 更新说明 / Release Notes

            请查看下方资产下载安装对应平台的版本。

            | 平台 | 文件 |
            |------|------|
            | macOS (Apple Silicon) | `*aarch64.dmg` |
            | macOS (Intel) | `*x64.dmg` |
            | Windows | `*_x64-setup.exe` |
            | Linux | `*_amd64.deb` / `*.AppImage` |

            ---

            See the assets below to download and install this version.
          releaseDraft: false
          prerelease: false
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', inputs.version) }}
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
          args: ${{ matrix.args }}
